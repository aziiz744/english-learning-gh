kind = "web"
previewPath = "/"
title = "English Learning Platform"
version = "1.0.0"
id = "artifacts/english-learning"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22575

[services.development]
run = "pnpm --filter @workspace/english-learning run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/english-learning", "run", "build" ]
publicDir = "artifacts/english-learning/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22575"
BASE_PATH = "/"
